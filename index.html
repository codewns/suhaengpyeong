<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위닝AI 수행평가 서비스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#f0f4ff;
    --sidebar:#1a1f3c;
    --primary:#4f63ff;
    --primary-2:#6d5dfc;
    --primary-light:#eef0ff;
    --border:#e8ecf8;
    --text:#1a1f3c;
    --text-sub:#6b7280;
    --ai-bubble:#f0f4ff;
    --shadow:0 4px 24px rgba(79,99,255,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family:'Noto Sans KR',sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
    overflow:hidden;
  }

  .sidebar {
    width:220px;
    min-width:220px;
    background:var(--sidebar);
    display:flex;
    flex-direction:column;
    padding:24px 0;
  }

  .sidebar-logo {
    padding:0 20px 20px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    margin-bottom:12px;
  }

  .sidebar-logo h1 { font-size:14px; font-weight:800; color:#fff; line-height:1.45; }
  .sidebar-logo span { font-size:11px; color:rgba(255,255,255,0.4); }

  .sidebar-section {
    padding:6px 12px 2px;
    font-size:10px;
    color:rgba(255,255,255,0.3);
    font-weight:700;
    letter-spacing:0.8px;
    text-transform:uppercase;
  }

  .sidebar-item {
    margin:2px 8px;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:rgba(255,255,255,0.6);
    transition:all 0.2s;
  }

  .sidebar-item:hover,
  .sidebar-item.active { background:var(--primary); color:#fff; }

  .sidebar-bottom {
    margin-top:auto;
    padding:16px 20px;
    border-top:1px solid rgba(255,255,255,0.08);
  }

  .step-item {
    display:flex;
    align-items:center;
    gap:10px;
    font-size:12px;
    color:rgba(255,255,255,0.4);
    margin-bottom:10px;
  }

  .step-item.done { color:rgba(255,255,255,0.8); }
  .step-item.current { color:#fff; font-weight:700; }

  .step-dot {
    width:20px;
    height:20px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    flex-shrink:0;
  }

  .step-item.done .step-dot { background:#22c55e; border-color:#22c55e; color:#fff; }
  .step-item.current .step-dot { background:var(--primary); border-color:var(--primary); color:#fff; }

  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .header {
    background:#fff;
    border-bottom:1px solid var(--border);
    padding:0 24px;
    height:56px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
  }

  .header-left { display:flex; align-items:center; gap:12px; }
  .header-subject { font-size:15px; font-weight:800; }
  .header-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; background:var(--primary-light); color:var(--primary); }

  .content {
    flex:1;
    display:flex;
    overflow:hidden;
    background:#fff;
  }

  .chat-panel {
    width:100%;
    display:flex;
    flex-direction:column;
    background:#fff;
    overflow:hidden;
  }

  .chat-messages {
    flex:1;
    overflow-y:auto;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .chat-messages::-webkit-scrollbar { width:4px; }
  .chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .msg-ai { display:flex; gap:12px; align-items:flex-start; animation:fadeUp 0.3s ease; }
  .msg-user { display:flex; justify-content:flex-end; animation:fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  .ai-avatar {
    width:36px;
    height:36px;
    border-radius:12px;
    background:linear-gradient(135deg,var(--primary),#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    font-size:16px;
  }

  .ai-name { font-size:11px; font-weight:700; color:var(--text-sub); margin-bottom:6px; }

  .ai-bubble {
    background:var(--ai-bubble);
    border-radius:4px 16px 16px 16px;
    padding:14px 18px;
    font-size:14px;
    line-height:1.7;
    max-width:720px;
  }

  .ai-bubble strong { color:var(--primary); }

  .user-bubble {
    background:var(--primary);
    color:#fff;
    border-radius:16px 4px 16px 16px;
    padding:12px 18px;
    font-size:14px;
    line-height:1.6;
    max-width:560px;
  }

  .recommend-cards { display:flex; flex-direction:column; gap:10px; margin-top:12px; }

  .recommend-card {
    background:#fff;
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
    cursor:pointer;
    transition:all 0.2s;
  }

  .recommend-card:hover { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,99,255,0.08); transform:translateY(-1px); }
  .recommend-card.selected { border-color:var(--primary); background:var(--primary-light); }
  .card-num { font-size:11px; font-weight:800; color:var(--primary); margin-bottom:4px; }
  .card-title { font-size:14px; font-weight:800; margin-bottom:4px; }
  .card-desc { font-size:12px; color:var(--text-sub); line-height:1.5; }

  .quick-btns { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }

  .quick-btn {
    padding:8px 14px;
    border:1px solid var(--border);
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
    background:#fff;
    color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    transition:all 0.2s;
  }

  .quick-btn:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-light); }

  .btn-primary {
    padding:11px 20px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:13px;
    font-weight:800;
    font-family:'Noto Sans KR',sans-serif;
    cursor:pointer;
    transition:all 0.2s;
  }

  .btn-primary:hover { background:#3d50e0; }

  .info-form {
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:12px;
    width:min(760px, calc(100vw - 310px));
  }

  .form-row { display:flex; gap:10px; }
  .form-group { flex:1; display:flex; flex-direction:column; gap:6px; }
  .form-label { font-size:12px; font-weight:800; color:var(--text-sub); }

  .form-input,
  .form-select,
  .form-textarea {
    padding:10px 14px;
    border:1px solid var(--border);
    border-radius:10px;
    font-size:13px;
    font-family:'Noto Sans KR',sans-serif;
    color:var(--text);
    outline:none;
    transition:border-color 0.2s;
    background:#fff;
  }

  .form-textarea { resize:vertical; min-height:90px; line-height:1.6; }
  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,99,255,0.08); }

  .form-submit {
    padding:12px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:14px;
    font-weight:800;
    font-family:'Noto Sans KR',sans-serif;
    cursor:pointer;
  }

  .upload-box {
    border:2px dashed var(--border);
    border-radius:16px;
    padding:22px;
    background:#fafbff;
    margin-top:12px;
    width:min(640px, calc(100vw - 310px));
  }

  .upload-head { font-size:15px; font-weight:900; margin-bottom:6px; }
  .upload-sub { font-size:12px; color:var(--text-sub); line-height:1.6; }

  .image-preview-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }

  .image-thumb-wrap {
    position:relative;
    width:82px;
    height:82px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid var(--border);
  }

  .image-thumb-wrap img { width:100%; height:100%; object-fit:cover; }

  .image-thumb-remove {
    position:absolute;
    top:2px;
    right:2px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:rgba(0,0,0,0.6);
    color:#fff;
    border:none;
    cursor:pointer;
    font-size:11px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .image-add-btn {
    width:82px;
    height:82px;
    border-radius:12px;
    border:2px dashed var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:22px;
    color:var(--text-sub);
    background:#fff;
  }

  .image-add-btn:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-light); }

  .chat-input-wrap { padding:16px 24px 20px; border-top:1px solid var(--border); flex-shrink:0; }

  .chat-input-box {
    display:flex;
    align-items:flex-end;
    gap:10px;
    background:#f7f8ff;
    border:1px solid var(--border);
    border-radius:16px;
    padding:10px 14px;
    transition:border-color 0.2s;
  }

  .chat-input-box:focus-within { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,99,255,0.08); }

  .chat-input {
    flex:1;
    border:none;
    background:transparent;
    font-size:14px;
    font-family:'Noto Sans KR',sans-serif;
    color:var(--text);
    outline:none;
    resize:none;
    max-height:120px;
    line-height:1.6;
  }

  .send-btn {
    width:36px;
    height:36px;
    border-radius:10px;
    background:var(--primary);
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }

  .send-btn:hover { background:#3d50e0; transform:scale(1.05); }

  .loading-bubble { display:flex; gap:6px; align-items:center; padding:6px 0; }
  .loading-dot { width:8px; height:8px; border-radius:50%; background:var(--primary); opacity:0.4; animation:bounce 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay:0.2s; }
  .loading-dot:nth-child(3) { animation-delay:0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform:translateY(0); opacity:0.4; }
    30% { transform:translateY(-6px); opacity:1; }
  }

  .modal-overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.42);
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s;
  }

  .modal-overlay.show { opacity:1; pointer-events:all; }

  .modal {
    background:#fff;
    border-radius:20px;
    width:560px;
    max-width:90vw;
    max-height:86vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transform:translateY(16px);
    transition:transform 0.2s;
  }

  .modal-overlay.show .modal { transform:translateY(0); }

  .modal-header {
    padding:20px 24px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
  }

  .modal-title { font-size:16px; font-weight:900; }

  .modal-close {
    width:32px;
    height:32px;
    border-radius:8px;
    border:none;
    background:var(--bg);
    cursor:pointer;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .modal-body { flex:1; overflow-y:auto; padding:20px 24px; }

  .report-modal { width:1180px; max-width:96vw; max-height:92vh; }

  .report-layout {
    display:grid;
    grid-template-columns:minmax(0,1fr) 250px;
    gap:18px;
    align-items:start;
  }

  .report-paper {
    background:#fff;
    border:1px solid var(--border);
    border-radius:18px;
    padding:28px;
    box-shadow:var(--shadow);
  }

  .report-paper-title {
    font-size:20px;
    font-weight:900;
    color:var(--text);
    margin-bottom:8px;
    line-height:1.4;
  }

  .report-paper-meta { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }

  .meta-tag { padding:4px 12px; border-radius:20px; font-size:11px; font-weight:800; }
  .tag-subject { background:#ede9fe; color:#7c3aed; }
  .tag-grade { background:#dbeafe; color:#1d4ed8; }
  .tag-career { background:#fce7f3; color:#9d174d; }

  .report-text {
    white-space:pre-wrap;
    font-size:14px;
    line-height:1.95;
    color:var(--text);
    word-break:keep-all;
  }

  .report-actions {
    position:sticky;
    top:0;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .report-action-card {
    border:1px solid var(--border);
    border-radius:16px;
    padding:14px;
    background:#fafbff;
  }

  .report-action-btn {
    width:100%;
    padding:13px 14px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:#fff;
    font-size:14px;
    font-weight:900;
    font-family:'Noto Sans KR',sans-serif;
    cursor:pointer;
  }

  .report-action-btn.secondary { background:#fff; color:var(--text); border:1px solid var(--border); }

  .report-help { font-size:11px; color:var(--text-sub); line-height:1.6; margin-top:10px; }

  .plan-composer { margin-top:22px; border-top:1px solid var(--border); padding-top:22px; }
  .plan-composer-title { font-size:18px; font-weight:900; margin-bottom:14px; color:var(--text); }
  .plan-composer-desc { font-size:13px; color:var(--text-sub); line-height:1.7; margin-bottom:18px; }
  .composer-field { margin-bottom:18px; }
  .composer-label { display:block; font-size:15px; font-weight:900; color:var(--text); margin-bottom:8px; }
  .composer-helper { font-size:12px; color:var(--text-sub); margin-bottom:8px; line-height:1.6; }

  .composer-input,
  .composer-textarea {
    width:100%;
    border:1px solid var(--border);
    background:#fbfcff;
    border-radius:16px;
    padding:16px 18px;
    font-family:'Noto Sans KR',sans-serif;
    font-size:15px;
    color:var(--text);
    outline:none;
    transition:all 0.2s;
  }

  .composer-input:focus,
  .composer-textarea:focus {
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(79,99,255,0.08);
    background:#fff;
  }

  .composer-input { min-height:56px; }
  .composer-textarea { resize:vertical; line-height:1.8; }
  .composer-textarea.intro { min-height:240px; }
  .composer-textarea.body { min-height:420px; }
  .composer-textarea.conclusion { min-height:240px; }

  .composer-submit-wrap { margin-top:12px; display:flex; justify-content:flex-end; }

  .composer-submit-btn {
    min-width:260px;
    padding:16px 22px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,var(--primary),var(--primary-2));
    color:#fff;
    font-size:18px;
    font-weight:900;
    font-family:'Noto Sans KR',sans-serif;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(79,99,255,0.2);
  }

  .composer-submit-btn:disabled { opacity:0.65; cursor:not-allowed; }

  .report-list-item {
    border:1px solid var(--border);
    border-radius:14px;
    padding:15px;
    margin-bottom:12px;
    cursor:pointer;
    background:#fff;
  }

  .report-list-item:hover { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,99,255,0.08); }
  .report-list-title { font-size:14px; font-weight:900; margin-bottom:5px; line-height:1.45; }
  .report-list-meta { font-size:11px; color:var(--text-sub); display:flex; flex-wrap:wrap; gap:6px; }

  .scrap-empty { text-align:center; padding:40px 20px; color:var(--text-sub); font-size:14px; }
  .toast { position:fixed; bottom:24px; right:24px; background:#1a1f3c; color:#fff; padding:12px 20px; border-radius:12px; font-size:13px; font-weight:700; z-index:999; opacity:0; transform:translateY(10px); transition:all 0.3s; }
  .toast.show { opacity:1; transform:translateY(0); }

  .connecting-banner { background:#fef3c7; border-bottom:1px solid #fde68a; padding:10px 24px; font-size:13px; color:#92400e; text-align:center; display:none; }
  .connecting-banner.show { display:block; }

  @media (max-width:980px) {
    body { overflow:auto; }
    .sidebar { display:none; }
    .info-form,
    .upload-box { width:100%; }
    .report-layout { grid-template-columns:1fr; }
    .report-actions { position:relative; }
    .composer-submit-wrap { justify-content:stretch; }
    .composer-submit-btn { width:100%; }
  }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>📚 위닝AI<br>수행평가 서비스</h1>
    <span>AI-Powered Assessment Helper</span>
  </div>

  <div class="sidebar-section">메뉴</div>
  <div class="sidebar-item active" onclick="setActiveMenu(this)">💬 위닝AI 채팅</div>
  <div class="sidebar-item" onclick="setActiveMenu(this); openReportListModal()">📁 저장 리포트</div>

  <div class="sidebar-bottom">
    <div style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px;">진행 단계</div>
    <div class="step-item current" id="step1"><div class="step-dot">1</div><span>기본 정보</span></div>
    <div class="step-item" id="step2"><div class="step-dot">2</div><span>안내문 입력</span></div>
    <div class="step-item" id="step3"><div class="step-dot">3</div><span>주제 추천</span></div>
    <div class="step-item" id="step4"><div class="step-dot">4</div><span>설계 리포트</span></div>
    <div class="step-item" id="step5"><div class="step-dot">5</div><span>작성·평가</span></div>
  </div>
</aside>

<div class="main">
  <div class="connecting-banner" id="connectingBanner">⏳ 서버 시작 중...</div>

  <header class="header">
    <div class="header-left">
      <span class="header-subject" id="headerTitle">위닝AI 수행평가 서비스</span>
      <span class="header-badge" id="headerBadge">새 세션</span>
    </div>

    <div style="display:flex;align-items:center;gap:16px;">
      <div id="callUsageWrap" style="display:none;align-items:center;gap:8px;">
        <div style="font-size:11px;color:var(--text-sub);" id="callUsageText"></div>
        <div style="width:80px;height:6px;background:#e8ecf8;border-radius:99px;overflow:hidden;">
          <div id="callUsageBar" style="height:100%;border-radius:99px;background:var(--primary);transition:width 0.4s;"></div>
        </div>
        <div style="font-size:11px;font-weight:800;" id="callUsagePct"></div>
      </div>
      <span class="header-badge">통합 설계 리포트</span>
    </div>
  </header>

  <div class="content">
    <div class="chat-panel" id="panelChat">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <div class="chat-input-box">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="수행평가 관련해서 궁금한 점을 물어보세요." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()" aria-label="send">
            <svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="reportModal" onclick="if(event.target===this) closeReportModal()">
  <div class="modal report-modal">
    <div class="modal-header">
      <span class="modal-title" id="reportModalTitle">수행평가 리포트</span>
      <button class="modal-close" onclick="closeReportModal()">✕</button>
    </div>
    <div class="modal-body" id="reportModalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="reportListModal" onclick="if(event.target===this) closeReportListModal()">
  <div class="modal" style="width:620px;">
    <div class="modal-header">
      <span class="modal-title">📁 저장 리포트</span>
      <button class="modal-close" onclick="closeReportListModal()">✕</button>
    </div>

    '영어':['공통영어 1','공통영어 2','영어Ⅰ','영어Ⅱ','영어 독해와 작문','영미 문학 읽기','영어 발표와 토론','심화 영어','미디어 영어','직접 입력'],
    '사회':['통합사회 1','통합사회 2','세계시민과 지리','세계사','사회와 문화','현대사회와 윤리','정치','법과 사회','경제','윤리와 사상','사회문제 탐구','기후변화와 지속가능한 세계','직접 입력'],

    '정보':['정보','인공지능 기초','데이터 과학','소프트웨어와 생활','정보과학','직접 입력'],
    '체육':['체육1','체육2','운동과 건강','스포츠 과학','스포츠 생활1','스포츠 생활2','직접 입력'],
    '예술':['음악','미술','연극','음악 감상과 비평','미술 창작','미술 감상과 비평','직접 입력'],
    '기술·가정':['기술·가정','로봇과 공학세계','생활과학 탐구','창의 공학 설계','지식 재산 일반','직접 입력'],
    '제2외국어':['중국어','일본어','독일어','프랑스어','스페인어','러시아어','아랍어','베트남어','직접 입력'],

    '교양':['진로와 직업','생태와 환경','인간과 철학','인간과 심리','보건','논술','직접 입력'],
    '직접 입력':['직접 입력']

  return map[group] || ['직접 입력'];
}

function updateSubjectSelect(prefix) {
  const groupEl = document.getElementById(`${prefix}SubjectGroupInput`);
  const subjectEl = document.getElementById(`${prefix}SubjectInput`);
  const customWrap = document.getElementById(`${prefix}CustomSubjectWrap`);
  if(!groupEl || !subjectEl) return;
  const group = groupEl.value;
  const options = getSubjectOptions(group);
  subjectEl.innerHTML = options.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
  if(customWrap) customWrap.style.display = subjectEl.value === '직접 입력' ? 'block' : 'none';
}

function updateCustomSubject(prefix) {
  const subjectEl = document.getElementById(`${prefix}SubjectInput`);
  const customWrap = document.getElementById(`${prefix}CustomSubjectWrap`);
  if(customWrap) customWrap.style.display = subjectEl?.value === '직접 입력' ? 'block' : 'none';
}

function initSubjectControls(prefix) {
  const groupEl = document.getElementById(`${prefix}SubjectGroupInput`);
  if(!groupEl) return;
  groupEl.innerHTML = getSubjectGroups().map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
  groupEl.value = '국어';
  updateSubjectSelect(prefix);
}

function getSelectedCurriculum(prefix) {
  const grade = document.getElementById(`${prefix}GradeInput`)?.value || '고등학생';
  const semester = document.getElementById(`${prefix}SemesterInput`)?.value || '';
  const schoolType = document.getElementById(`${prefix}SchoolTypeInput`)?.value || '일반고';
  const group = document.getElementById(`${prefix}SubjectGroupInput`)?.value || '';
  const subjectChoice = document.getElementById(`${prefix}SubjectInput`)?.value || '';
  const customSubject = document.getElementById(`${prefix}CustomSubjectInput`)?.value?.trim() || '';
  const realSubject = subjectChoice === '직접 입력' ? customSubject : subjectChoice;
  const subject = group && realSubject ? `${group} / ${realSubject}` : realSubject;
  return {
    grade,
    semester,
    gradeWithSemester: semester ? `${grade} ${semester}` : grade,
    school_type: schoolType,
    subject_group: group,
    subject_name: realSubject,
    subject
  };
}

async function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const code = document.getElementById('loginCode').value.trim().toUpperCase();
  const errEl = document.getElementById('loginError');
  const btn = document.querySelector('#loginOverlay button');

  if(!name || !code) {
    errEl.textContent = '이름과 코드를 모두 입력해주세요.';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  btn.textContent = '확인 중...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/login`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ name, code })
    });

    const data = await res.json();

    if(!res.ok) {
      errEl.textContent = data.detail || '로그인 실패';
      errEl.style.display = 'block';
      btn.textContent = '시작하기 →';
      btn.disabled = false;
      return;
    }

    sessionId = data.session_id;
    studentName = data.name;
    studentCode = data.code;

    document.getElementById('headerBadge').textContent = data.name;
    document.getElementById('loginOverlay').style.display = 'none';
    updateCallUsage(data.call_count || 0, data.call_limit || 0);
    showWelcome(data.name);
  } catch(e) {
    errEl.textContent = '서버 연결 실패. 잠시 후 다시 시도해주세요.';
    errEl.style.display = 'block';
    btn.textContent = '시작하기 →';
    btn.disabled = false;
  }
}

function showWelcome(name) {
  document.getElementById('chatMessages').innerHTML = '';
  selectedTopic = null;
  assessmentInfo = null;
  pendingImages = [];

  addAiMsg(`안녕하세요, <strong>${esc(name)}</strong>님! 👋<br><br>수행평가를 도와드릴게요.<br>먼저 <strong>학년, 과목, 이전 주제, 희망 진로</strong>를 입력해주세요.`, true);
  showPreUploadForm();
}

              <option>고1</option>
              <option>고2</option>
              <option>고3</option>

        <div class="form-group">
          <label class="form-label">희망 진로 <span style="color:#ef4444;">*</span></label>

function submitPreForm() {
  const curriculum = getSelectedCurriculum('pre');
  const prevTopic = document.getElementById('prePrevTopicInput').value.trim();
  const career = document.getElementById('preCareerInput').value.trim();

  if(!curriculum.subject_name) {
    showToast('과목을 선택하거나 직접 입력해주세요.');
    return;

  if(!career) {
    showToast('희망 진로를 입력해주세요.');
    return;
  }

  document.getElementById('preUploadForm').style.display = 'none';

  studentInfo = {
    grade: curriculum.grade,
    semester: curriculum.semester,
    gradeWithSemester: curriculum.gradeWithSemester,
    schoolType: curriculum.school_type,
    subjectGroup: curriculum.subject_group,

  showUploadArea();

function showUploadArea() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-ai';
  wrap.id = 'uploadAreaWrap';
  wrap.innerHTML = `
    <div class="ai-avatar">🤖</div>
    <div style="width:100%;">
      <div class="ai-name">위닝AI 수행평가 서포터</div>
      <div class="upload-box">
        <div class="upload-head">📄 수행평가 안내문 업로드</div>

        <div id="imagePreviewGrid" class="image-preview-grid">
          <div class="image-add-btn" onclick="document.getElementById('multiFileInput').click()">

          </div>
        </div>
        <input type="file" id="multiFileInput" style="display:none" accept="image/*" multiple onchange="addImages(event)">
        <div style="display:flex;gap:8px;margin-top:14px;">
          <button class="btn-primary" id="uploadConfirmBtn" onclick="uploadAllImages()" disabled style="flex:1;">📤 분석 시작하기</button>
          <button class="quick-btn" onclick="skipToManualInfo()" style="flex:1;border-radius:10px;">📝 안내문 없이 시작하기</button>
        </div>
      </div>
    </div>`;
  document.getElementById('chatMessages').appendChild(wrap);
  scrollBot();
}

function addImages(event) {
  const files = Array.from(event.target.files || []);
  const allowed = ['image/jpeg','image/png','image/webp'];

  for(const file of files) {
    if(!allowed.includes(file.type)) {
      showToast('JPG, PNG, WEBP 파일만 업로드할 수 있습니다.');
      continue;
    }
    pendingImages.push({ id: Date.now() + Math.random(), file, url: URL.createObjectURL(file) });
  }

  event.target.value = '';
  renderImagePreview();
}

function renderImagePreview() {
  const grid = document.getElementById('imagePreviewGrid');
  if(!grid) return;

  const thumbs = pendingImages.map(img => `
    <div class="image-thumb-wrap">
      <img src="${img.url}" alt="preview">
      <button class="image-thumb-remove" onclick="removePendingImage('${img.id}')">✕</button>
    </div>
  `).join('');

  grid.innerHTML = `${thumbs}
    <div class="image-add-btn" onclick="document.getElementById('multiFileInput').click()">
      <span>+</span>
      <span style="font-size:10px;margin-top:2px;">사진 추가</span>
    </div>`;

  const btn = document.getElementById('uploadConfirmBtn');
  if(btn) btn.disabled = pendingImages.length === 0;
}

function removePendingImage(id) {
  pendingImages = pendingImages.filter(img => String(img.id) !== String(id));
  renderImagePreview();
}

async function uploadImageToStorage(file, folder='assessment') {
  const ext = file.name.split('.').pop() || 'jpg';
  const safeCode = studentCode || 'anonymous';
  const path = `${folder}/${safeCode}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

  const { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, file, {
    contentType: file.type,
    upsert:false
  });

  if(error) {
    throw new Error(`이미지 업로드 실패: ${error.message}`);
  }

  return { path, mime_type:file.type };
}

async function uploadAllImages() {
  if(!pendingImages.length) {
    showToast('사진을 먼저 추가해주세요.');
    return;
  }

  const uploadWrap = document.getElementById('uploadAreaWrap');
  if(uploadWrap) uploadWrap.style.opacity = '0.5';

  addUserMsg(`📎 안내문 사진 ${pendingImages.length}장 업로드`);
  addLoading();
  updateStep(3);

  try {
    let combinedResult = '';

    for(let i=0; i<pendingImages.length; i++) {
      const uploaded = await uploadImageToStorage(pendingImages[i].file, 'assessment');

      const res = await apiFetch(`${API}/analyze-assessment-storage`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          session_id:sessionId,
          image_path:uploaded.path,
          mime_type:uploaded.mime_type,
          subject:studentInfo?.subject || '',
          career:studentInfo?.career || '',
          grade:studentInfo?.gradeWithSemester || studentInfo?.grade || '고등학생',
          school_type:studentInfo?.schoolType || '일반고'
        })
      });

      const data = await res.json();
      if(!res.ok) throw new Error(data.error_message || data.detail || '분석 중 오류가 발생했습니다.');
      if(data.call_count !== undefined) updateCallUsage(data.call_count, data.call_limit || 0);
      combinedResult += (pendingImages.length > 1 ? `\n\n[사진 ${i+1}]\n` : '') + (data.assessment_info || '');
    }

    assessmentInfo = combinedResult;
    pendingImages = [];
    removeLoading();
    if(uploadWrap) uploadWrap.remove();

    addAiMsg('✅ <strong>안내문 분석 완료!</strong> 이제 주제를 추천해드릴게요.', true);
    await requestTopics();
  } catch(e) {
    removeLoading();
    if(uploadWrap) uploadWrap.style.opacity = '1';
    addAiMsg(`❌ ${esc(e.message || '분석 중 오류가 발생했어요.')}`, true);
  }
}

function skipToManualInfo() {
  const uploadWrap = document.getElementById('uploadAreaWrap');
  if(uploadWrap) uploadWrap.remove();
  pendingImages = [];
  updateStep(3);
  addUserMsg('안내문 없이 시작할게요');

}

async function requestTopics() {
  addLoading();
  updateStep(3);

  try {
    const res = await apiFetch(`${API}/recommend-topics`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        session_id:sessionId,
        grade:studentInfo?.gradeWithSemester || studentInfo?.grade || '고등학생',
        subject:studentInfo?.subject || '국어',
        school_type:studentInfo?.schoolType || '일반고',
        desired_career:studentInfo?.career || '',
        previous_topic:studentInfo?.prevTopic || '',
        assessment_info:assessmentInfo || null
      })
    });

    const data = await res.json();
    if(!res.ok) throw new Error(data.error_message || data.detail || '주제 추천 중 오류가 발생했어요.');
    if(data.call_count !== undefined) updateCallUsage(data.call_count, data.call_limit || 0);

    removeLoading();
    updateStep(4);
    showTopicCards(data.topics || '');
  } catch(e) {
    removeLoading();
    addAiMsg(`❌ ${esc(e.message || '주제 추천 중 오류가 발생했어요.')}`, true);
  }
}

function parseTopics(text) {
  const raw = stripMarkdown(String(text || '')).trim();
  if(!raw) return [];

  const blocks = raw
    .split(/\n(?=\s*(?:주제\s*)?\d+\s*[\.\)]|\s*\d+\s*번\s*주제|\s*[-•]\s*)/g)
    .map(v => v.trim())
    .filter(Boolean);

  const source = blocks.length >= 2 ? blocks : raw.split(/\n{2,}/).map(v => v.trim()).filter(Boolean);

  return source.slice(0, 5).map((block, idx) => {
    const lines = block.split('\n').map(v => v.trim()).filter(Boolean);
    let title = lines[0] || `추천 주제 ${idx+1}`;
    title = title.replace(/^[-•]\s*/, '').replace(/^(주제\s*)?\d+\s*[\.\)]\s*/, '').replace(/^\d+\s*번\s*주제\s*[:：]?\s*/, '').trim();
    title = title.replace(/^주제명\s*[:：]\s*/, '').trim();

    const details = {};
    for(const line of lines.slice(1)) {
      const m = line.match(/^(.{1,28}?)[：:](.*)$/);
      if(m) details[m[1].trim()] = m[2].trim();
    }

    return { title, raw:block, details };
  });
}

function showTopicCards(topicsText) {
  topicDataStore = parseTopics(topicsText);

  if(!topicDataStore.length) {
    addAiMsg('추천 주제를 파싱하지 못했어요. 다시 시도해주세요.');
    return;
  }

  const cards = topicDataStore.map((t, i) => {
    const desc = Object.values(t.details || {}).join(' ').slice(0, 120) || t.raw.slice(0, 120);
    return `
      <div class="recommend-card" id="topicCard${i}" onclick="openTopicModal(${i})">
        <div class="card-num">추천 주제 ${i+1}</div>
        <div class="card-title">${esc(t.title)}</div>
        <div class="card-desc">${esc(desc)}${desc.length >= 120 ? '...' : ''}</div>
      </div>`;
  }).join('');

  addAiMsg(`수행평가 조건과 진로를 바탕으로 주제를 추천했어요. 마음에 드는 주제를 선택하면 <strong>통합 설계 리포트</strong>를 바로 만들어드릴게요.<div class="recommend-cards">${cards}</div><div class="quick-btns"><button class="quick-btn" onclick="retryTopics()">🔄 다른 주제 다시 추천</button></div>`, true);
}

async function confirmTopic(idx) {
  const t = topicDataStore[idx];
  if(!t) return;

  document.querySelectorAll('.recommend-card').forEach(c => {
    c.onclick = null;
    c.style.cursor = 'default';
    c.style.opacity = '0.5';
  });

  const card = document.getElementById(`topicCard${idx}`);
  if(card) {
    card.classList.add('selected');
    card.style.opacity = '1';
    card.style.border = '2px solid var(--primary)';
  }

  selectedTopic = t.title;
  addUserMsg(`"${t.title}" 으로 확정할게요!`);
  addLoading();

  const detailText = Object.entries(t.details || {}).map(([k,v]) => `${k}: ${v}`).join('\n');

  try {
    const res = await apiFetch(`${API}/find-resources`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        session_id:sessionId,
        selected_topic:t.title,
        selected_topic_detail:detailText
      })
    });

    const data = await res.json();
    if(!res.ok) throw new Error(data.error_message || data.detail || '설계 리포트 생성 중 오류가 발생했어요.');
    if(data.call_count !== undefined) updateCallUsage(data.call_count, data.call_limit || 0);

    removeLoading();
    updateStep(5);
    latestPlanReport = data.plan_report || data.resources || '';
    latestPlanReportId = data.report_id || null;

    addAiMsg('선택 주제에 대한 <strong>통합 수행평가 설계 리포트</strong>를 준비했어요. 팝업에서 주제 정보, 추천 자료, 서론·본론·결론 구조를 확인하고 바로 작성하세요.', true, true);

  }
}

async function submitPlanFromModal() {
  const topic = document.getElementById('modalTopicInput')?.value?.trim() || '';
  const intro = document.getElementById('modalIntroInput')?.value?.trim() || '';
  const body = document.getElementById('modalBodyInput')?.value?.trim() || '';
  const conclusion = document.getElementById('modalConclusionInput')?.value?.trim() || '';
  const btn = document.getElementById('modalSubmitBtn');

  if(!topic || !intro || !body || !conclusion) {
    showToast('주제, 서론, 본론, 결론을 모두 작성해주세요.');
    return;
  }

  const combinedText = `주제: ${topic}\n\n[서론]\n${intro}\n\n[본론]\n${body}\n\n[결론]\n${conclusion}`;

  try {
    if(btn) {
      btn.disabled = true;
      btn.textContent = '평가 리포트 생성 중...';
    }

    const res = await apiFetch(`${API}/evaluate-text`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        session_id:sessionId,
        submission_text:combinedText,
        confirm_submit:true
      })
    });

    const data = await res.json();
    if(!res.ok) throw new Error(data.error_message || data.detail || '평가 리포트 생성 중 오류가 발생했습니다.');

    if(data.call_count !== undefined) updateCallUsage(data.call_count, data.call_limit || 0);

    const reportText = data.evaluation || data.evaluation_report || data.report_content || data.result || data.feedback || '평가 리포트가 생성되었습니다.';
    latestEvaluationReportId = data.report_id || null;
    selectedTopic = topic;

    showEvaluationReportModal(topic, reportText, latestEvaluationReportId);
  } catch(err) {
    console.error(err);
    showToast(err.message || '평가 리포트 생성 중 오류가 발생했습니다.');
  } finally {
    if(btn) {
      btn.disabled = false;
      btn.textContent = '📊 제출하고 평가 리포트 받기';
    }
  }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;

  input.value = '';
  autoResize(input);
  addUserMsg(text);

  const lower = text.toLowerCase();
  const howKeywords = ['어떻게','방법','작성','써야','쓰면','시작','뭐부터','모르겠','막막','도움'];
  if(howKeywords.some(k => lower.includes(k))) {
    addAiMsg('생성된 설계 리포트의 서론·본론·결론 작성 방향을 보고, 팝업 안의 큰 작성 폼에 직접 작성하면 됩니다.');
    return;
  }

  addAiMsg('수행평가와 관련된 질문을 해주세요. 주제 선택 후에는 설계 리포트 팝업 안에서 바로 작성할 수 있습니다.');
}

async function apiFetch(url, options={}, timeoutMs=120000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);

  try {
    const res = await fetch(url, { ...options, signal:controller.signal });
    clearTimeout(timer);
    return res;
  } catch(e) {
    clearTimeout(timer);
    if(e.name === 'AbortError') throw new Error('응답 시간이 너무 길어요. 잠시 후 다시 시도해주세요.');
    throw e;
  }
}

function updateCallUsage(count, limit) {
  if(!limit) return;
  const remaining = Math.max(0, limit - count);
  const pct = Math.round((remaining / limit) * 100);
  const color = pct > 50 ? '#22c55e' : pct > 20 ? '#f59e0b' : '#ef4444';
  document.getElementById('callUsageWrap').style.display = 'flex';
  document.getElementById('callUsageText').textContent = `잔여 ${remaining}회`;
  document.getElementById('callUsageBar').style.width = pct + '%';
  document.getElementById('callUsageBar').style.background = color;
  document.getElementById('callUsagePct').style.color = color;
  document.getElementById('callUsagePct').textContent = pct + '%';
}

function updateStep(step) {
  for(let i=1; i<=5; i++) {
    const el = document.getElementById(`step${i}`);
    if(!el) continue;
    el.classList.remove('done','current');
    const dot = el.querySelector('.step-dot');
    if(i < step) {
      el.classList.add('done');
      if(dot) dot.textContent = '✓';
    } else if(i === step) {
      el.classList.add('current');
      if(dot) dot.textContent = String(i);
    } else {
      if(dot) dot.textContent = String(i);
    }
  }
}

function addAiMsg(html, isHTML=false, scrapable=false) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-ai';
  const content = isHTML ? html : esc(html).replace(/\n/g,'<br>');
  wrap.innerHTML = `<div class="ai-avatar">🤖</div><div><div class="ai-name">위닝AI 수행평가 서포터</div><div class="ai-bubble">${content}</div></div>`;
  document.getElementById('chatMessages').appendChild(wrap);
  scrollBot();
  return wrap;
}

function addUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-user';
  wrap.innerHTML = `<div class="user-bubble">${esc(text).replace(/\n/g,'<br>')}</div>`;
  document.getElementById('chatMessages').appendChild(wrap);
  scrollBot();
}

function addLoading() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-ai';
  wrap.id = 'loadingMsg';
  wrap.innerHTML = `<div class="ai-avatar">🤖</div><div><div class="ai-name">위닝AI 수행평가 서포터</div><div class="ai-bubble"><div class="loading-bubble"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div></div>`;
  document.getElementById('chatMessages').appendChild(wrap);
  scrollBot();
}

function removeLoading() {
  const e = document.getElementById('loadingMsg');
  if(e) e.remove();
}

function scrollBot() {
  const e = document.getElementById('chatMessages');
  if(e) e.scrollTop = e.scrollHeight;
}

function stripMarkdown(text) {
  return String(text || '')
    .replace(/#{1,6}\s*/g, '')
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g, '$1')
    .replace(/^\s*[-*]\s+/gm, '')
    .replace(/^---+$/gm, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function esc(t) {
  return String(t ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function escJs(t) {
  return String(t ?? '')
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/\n/g,' ')
    .replace(/\r/g,' ');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function setActiveMenu(el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}

function init() {
  const banner = document.getElementById('connectingBanner');
  if(banner) banner.classList.remove('show');
}

init();
</script>
